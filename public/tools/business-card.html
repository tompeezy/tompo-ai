<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Get Notified LLC - Business Cards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#eee;padding:40px 20px}
.screen-header{text-align:center;margin-bottom:24px}
.screen-header h1{font-size:1rem;color:#333;font-weight:700}
.screen-header p{font-size:.8rem;color:#888;margin-top:4px}
.print-btn{display:block;margin:0 auto 32px;padding:10px 28px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:.88rem;font-weight:700;cursor:pointer}
.preview{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;margin-bottom:32px}
.card-label{font-size:.7rem;font-weight:700;color:#888;text-align:center;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card{width:336px;height:192px;overflow:hidden;position:relative;flex-shrink:0;background:#fff;border:2px solid #1a2744}
.card-front{display:flex;flex-direction:column;justify-content:space-between;padding:18px 20px;background:#fff}
.card-front .top{display:flex;justify-content:space-between;align-items:flex-start}
.card-front .brand-name{font-size:1.4rem;font-weight:900;letter-spacing:-.5px;line-height:1;color:#1a2744}
.card-front .brand-name span{color:#f59e0b}
.card-front .tagline{font-size:.62rem;color:#1a2744;margin-top:5px;letter-spacing:.3px;font-style:italic;font-weight:600}
.card-front .qr-wrap{border:2px solid #1a2744;padding:3px}
.card-front .qr-wrap img{width:58px;height:58px;display:block}
.card-front .scan-label{font-size:.52rem;color:#f59e0b;text-align:center;margin-top:3px;font-weight:700}
.card-front .middle{font-size:.64rem;color:#1a2744;letter-spacing:.4px;text-transform:uppercase;font-weight:700;border-top:1.5px solid #1a2744;border-bottom:1.5px solid #1a2744;padding:4px 0}
.card-front .name{font-size:1rem;font-weight:900;color:#1a2744}
.card-front .title{font-size:.62rem;color:#f59e0b;font-weight:700;margin-top:2px;letter-spacing:.3px;text-transform:uppercase}
.card-back{display:flex;flex-direction:column;justify-content:space-between;padding:14px 18px;background:#fff}
.card-back .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-back .services-title{font-size:.62rem;font-weight:900;text-transform:uppercase;letter-spacing:.8px;color:#f59e0b;margin-bottom:6px;border-bottom:2px solid #1a2744;padding-bottom:3px}
.card-back ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:3px 10px}
.card-back ul li{font-size:.64rem;font-weight:700;color:#1a2744;display:flex;align-items:center;gap:4px}
.card-back ul li:before{content:"✓";font-weight:900;font-size:.7rem;color:#f59e0b}
.card-back .divider{width:1px;background:#1a2744;flex-shrink:0}
.card-back .contact{font-size:.64rem;font-weight:700;text-align:right;white-space:nowrap;color:#1a2744}
.card-back .contact div{margin-bottom:5px}
.card-back .website{font-weight:900;font-size:.68rem;color:#f59e0b}
.card-back .bottom{display:flex;justify-content:space-between;align-items:center;border-top:1.5px solid #1a2744;padding-top:5px;margin-top:2px}
.card-back .vet{font-size:.58rem;color:#f59e0b;font-weight:700}
.card-back .nc{font-size:.58rem;color:#1a2744;font-weight:600}
@media print{
*{-webkit-print-color-adjust:exact;print-color-adjust:exact}
body{background:white;padding:0;margin:0}
.screen-only{display:none!important}
.print-sheet{width:8.5in;height:11in;padding:.5in .75in;display:grid;grid-template-columns:3.5in 3.5in;grid-template-rows:repeat(5,2in);gap:0;page-break-after:always;break-after:page}
.print-sheet:last-child{page-break-after:auto;break-after:auto}
.card{width:3.5in;height:2in;border:1.5px solid #1a2744}
.preview{display:none}
}
</style>
</head>
<body>
<div class="screen-only">
<div class="screen-header">
<h1>Get Notified LLC - Business Cards</h1>
<p>10 per sheet · Page 1 = Fronts · Page 2 = Backs · Print on white cardstock · Cut to 3.5" x 2"</p>
</div>
<button class="print-btn" onclick="window.print()">Print Cards (10 per sheet)</button>
<div class="preview">
<div><div class="card-label">Front</div><div class="card card-front" id="fp"></div></div>
<div><div class="card-label">Back</div><div class="card card-back" id="bp"></div></div>
</div>
</div>
<div class="print-sheet" id="fronts"></div>
<div class="print-sheet" id="backs"></div>
<script>
var f='<div class="top"><div style="flex:1"><div class="brand-name">GET <span>NOTIFIED</span> LLC</div><div class="tagline">Safety Without Surveillance</div></div><div><div class="qr-wrap"><img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://getnotifiedllc.com&color=1a2744&bgcolor=ffffff"/></div><div class="scan-label">Scan for quote</div></div></div><div class="middle">Smart Home &nbsp;·&nbsp; Elder Safety &nbsp;·&nbsp; Property Protection</div><div class="bottom"><div><div class="name">Thomas Whitlock</div><div class="title">Owner &nbsp;·&nbsp; Installer</div></div></div>';
var b='<div class="top"><div style="flex:1"><div class="services-title">What We Install</div><ul><li>Leak Detection</li><li>Fall Sensors</li><li>Entry Monitoring</li><li>Smoke Alerts</li><li>Panic Buttons</li><li>Smart Locks</li><li>Water Shutoff</li><li>Temp Sensors</li></ul></div><div class="divider"></div><div class="contact"><div>704-239-7532</div><div>gettompoai@gmail.com</div><div class="website">getnotifiedllc.com</div><div style="margin-top:5px;font-size:.58rem;color:#1a2744">Salisbury, NC</div></div></div><div class="bottom"><div class="vet">&#127482;&#127480; Veteran discounts — ask us</div><div class="nc">Rowan County &amp; surrounding areas</div></div>';
document.getElementById('fp').innerHTML=f;
document.getElementById('bp').innerHTML=b;
var fs=document.getElementById('fronts');
var bs=document.getElementById('backs');
for(var i=0;i<10;i++){
var fc=document.createElement('div');fc.className='card card-front';fc.innerHTML=f;fs.appendChild(fc);
var bc=document.createElement('div');bc.className='card card-back';bc.innerHTML=b;bs.appendChild(bc);
}
</script>
</body>
</html>
